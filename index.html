<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour MP Resignation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C8102E;
    --red-dark: #8B0000;
    --gold: #D4A017;
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece4;
    --muted: #666;
  }

  html, body {
    height: 100%;
    width: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.35; transform: scale(0.65); }
  }

  .headline {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: clamp(15px, 3.5vw, 20px);
    font-weight: 600;
    color: rgba(240,236,228,0.55);
    letter-spacing: 0.01em;
    line-height: 1.4;
    max-width: 480px;
  }

  .count-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(140px, 38vw, 260px);
    line-height: 0.88;
    color: var(--red);
    letter-spacing: -0.01em;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    margin: 0.3rem 0 0.6rem;
  }

  .count-number.bump { transform: scale(1.07); }

  .subline {
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: clamp(15px, 3.5vw, 20px);
    font-style: italic;
    color: rgba(240,236,228,0.45);
    line-height: 1.4;
    max-width: 440px;
    margin-bottom: 2.5rem;
  }

  .subline strong {
    font-style: normal;
    font-weight: 600;
    color: rgba(240,236,228,0.75);
  }

  .progress-section {
    width: 100%;
    max-width: 500px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .progress-track {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: visible;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -4px;
    width: 13px;
    height: 13px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(139,0,0,0.6);
  }

  .progress-fill.triggered        { background: var(--gold); }
  .progress-fill.triggered::after { background: var(--gold); box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px rgba(212,160,23,0.5); }

  .milestone {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    transition: border-color 0.5s, background 0.5s;
  }

  .milestone.active {
    border-color: var(--gold);
    background: rgba(212,160,23,0.07);
  }

  .milestone-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.5s;
  }

  .milestone.active .milestone-text { color: var(--gold); }

  .timestamp {
    margin-top: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
</style>
</head>
<body>

  <div class="live-badge">
    <div class="dot"></div>
    Live tracker
  </div>

  <div class="headline">Labour MPs calling for Keir Starmer to resign</div>

  <div class="count-number" id="count-display">–</div>

  <div class="subline">
    <strong>Labour MPs</strong> have publicly called on
    <strong>Keir Starmer</strong> to resign as Prime Minister
  </div>

  <div class="progress-section">
    <div class="progress-meta">
      <span>Leadership contest threshold</span>
      <span><span id="pct-display">0</span>&thinsp;/&thinsp;81</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="milestone" id="milestone">
      <span class="milestone-text" id="milestone-text">81 MPs needed to trigger a leadership contest</span>
    </div>
  </div>

  <div class="timestamp" id="last-updated">Fetching data…</div>

<script>
  const SHEET_ID   = '1HRkxPrpNxKeMTVxtl38cdRqTghOKH_jE31PcF1jGpb8';
  const SHEET_NAME = 'Sheet1';
  const THRESHOLD  = 81;

  async function fetchSheet() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&tq=${encodeURIComponent('select A')}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw  = await res.text();
    const json = JSON.parse(raw.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    const rows = (json.table && json.table.rows) ? json.table.rows : [];
    return rows
      .map(r => r.c && r.c[0] && r.c[0].v ? String(r.c[0].v).trim() : null)
      .filter(Boolean)
      .filter(n => !/^name$/i.test(n));
  }

  function updateUI(names) {
    const count = names.length;
    const el    = document.getElementById('count-display');
    const prev  = parseInt(el.textContent) || 0;

    el.textContent = count;
    if (count !== prev && prev > 0) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 500);
    }

    document.getElementById('progress-fill').style.width = Math.min(100, (count / THRESHOLD) * 100) + '%';
    document.getElementById('pct-display').textContent   = count;

    const milestone     = document.getElementById('milestone');
    const milestoneText = document.getElementById('milestone-text');
    const fill          = document.getElementById('progress-fill');

    if (count >= THRESHOLD) {
      fill.classList.add('triggered');
      milestone.classList.add('active');
      milestoneText.textContent = '⚑  Leadership contest triggered';
    } else {
      fill.classList.remove('triggered');
      milestone.classList.remove('active');
      const remaining = THRESHOLD - count;
      milestoneText.textContent = `${remaining} more MP${remaining === 1 ? '' : 's'} needed to trigger a leadership contest`;
    }

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })} · ${now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}`;
  }

  async function refreshData() {
    try {
      const names = await fetchSheet();
      updateUI(names);
    } catch (err) {
      document.getElementById('last-updated').textContent = 'Could not fetch data — retrying…';
      console.error(err);
    }
  }

  refreshData();
  setInterval(refreshData, 60000);
</script>
</body>
</html>
