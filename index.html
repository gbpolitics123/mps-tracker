<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour MP Resignation Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #C8102E;
    --gold:   #D4A017;
    --bg:     #0d0d0d;
    --dim:    rgba(255,255,255,0.07);
    --muted:  #555;
    --text:   #f0ece4;
  }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;

    /* FIXED FOR MOBILE */
    justify-content: flex-start;

    padding: 2rem 1.25rem;
    text-align: center;
    gap: 0;

    /* MOBILE SAFETY */
    overflow-x: hidden;
  }

  /* LIVE DOT */
  .live {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 1.6rem;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; }
    50%      { opacity:0.25; }
  }

  /* TOP LABEL */
  .label-top {
    font-family: 'Crimson Pro', serif;
    font-size: clamp(13px, 4vw, 18px);
    font-weight: 600;
    color: rgba(240,236,228,0.45);
    letter-spacing: 0.02em;
    line-height: 1.5;
    margin-bottom: 0.2rem;
  }

  /* BIG NUMBER */
  .number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(130px, 45vw, 280px);
    line-height: 0.85;
    color: var(--red);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    margin: 0.15rem 0;
  }
  .number.pop { transform: scale(1.08); }

  /* BOTTOM LABEL */
  .label-bot {
    font-family: 'Crimson Pro', serif;
    font-size: clamp(13px, 4vw, 18px);
    font-style: italic;
    color: rgba(240,236,228,0.38);
    line-height: 1.5;
    margin-bottom: 2.4rem;
  }
  .label-bot strong {
    font-style: normal;
    font-weight: 600;
    color: rgba(240,236,228,0.65);
  }

  /* PROGRESS */
  .bar-wrap {
    width: 100%;
    max-width: 460px;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
  }

  .bar-track {
    width: 100%;
    height: 4px;
    background: var(--dim);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    transition: width 1.1s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -4px;
    width: 12px; height: 12px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 0 3px #0d0d0d, 0 0 0 4px var(--red);
  }

  .bar-fill.done        { background: var(--gold); }
  .bar-fill.done::after { background: var(--gold); box-shadow: 0 0 0 3px #0d0d0d, 0 0 0 4px var(--gold); }

  /* MILESTONE CAPTION */
  .caption {
    margin-top: 13px;
    padding: 9px 16px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 5px;
    background: rgba(255,255,255,0.03);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
  }

  .caption.done {
    color: var(--gold);
    border-color: rgba(212,160,23,0.4);
    background: rgba(212,160,23,0.06);
  }

  /* TIMESTAMP */
  .ts {
    margin-top: 1.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: #3a3a3a;
  }
</style>
</head>

<body>

<div class="live"><div class="dot"></div>Live tracker</div>

<div class="label-top">Labour MPs calling for Keir Starmer to resign</div>

<div class="number" id="num">–</div>

<div class="bar-wrap">
  <div class="bar-labels">
    <span>Enough for leadership contest</span>
    <span><span id="count">0</span>&thinsp;/&thinsp;81</span>
  </div>

  <div class="bar-track">
    <div class="bar-fill" id="fill" style="width:0%"></div>
  </div>

  <div class="caption" id="caption">Leadership contest triggered</div>
</div>

<div class="ts" id="ts">Fetching…</div>

<script>
  const SHEET_ID   = '1HRkxPrpNxKeMTVxtl38cdRqTghOKH_jE31PcF1jGpb8';
  const SHEET_NAME = 'Sheet1';
  const THRESHOLD  = 81;

  async function load() {
    try {
      const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&tq=${encodeURIComponent('select A')}`;
      const res  = await fetch(url);
      const raw  = await res.text();
      const json = JSON.parse(raw.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
      const rows = json.table?.rows || [];

      const names = rows
        .map(r => r.c?.[0]?.v ? String(r.c[0].v).trim() : null)
        .filter(v => v && !/^name$/i.test(v));

      render(names.length);
    } catch(e) {
      document.getElementById('ts').textContent = 'Connection error — retrying…';
    }
  }

  function render(n) {
    const el   = document.getElementById('num');
    const prev = parseInt(el.textContent) || 0;

    el.textContent = n;

    if (n !== prev && prev > 0) {
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 400);
    }

    document.getElementById('count').textContent = n;
    document.getElementById('fill').style.width =
      Math.min(100, n / THRESHOLD * 100) + '%';

    const done = n >= THRESHOLD;
    document.getElementById('fill').classList.toggle('done', done);
    document.getElementById('caption').classList.toggle('done', done);

    const now = new Date();
    document.getElementById('ts').textContent =
      `Updated ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})} · ${now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  }

  load();
  setInterval(load, 60000);
</script>

</body>
</html>
