<style>
#labour-tracker-widget *,
#labour-tracker-widget *::before,
#labour-tracker-widget *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

#labour-tracker-widget{
  --red:#C8102E;
  --red-dark:#8B0000;
  --gold:#D4A017;
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:rgba(255,255,255,0.08);
  --text:#f0ece4;
  --muted:#888;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Crimson Pro',Georgia,serif;
  --font-mono:'DM Mono',monospace;

  width:100%;
  max-width:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  padding:18px 14px;
  -webkit-text-size-adjust:100%;
}

#labour-tracker-widget .widget{
  width:100%;
  max-width:640px;
  margin:auto;
}

#labour-tracker-widget .header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}

#labour-tracker-widget .rose{
  font-size:28px;
  line-height:1;
  flex-shrink:0;
}

#labour-tracker-widget .header-text{
  flex:1;
  min-width:0;
}

#labour-tracker-widget .label-live{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:.12em;
  color:var(--red);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:3px;
}

#labour-tracker-widget .dot{
  width:6px;
  height:6px;
  background:var(--red);
  border-radius:50%;
  animation:trackerPulse 1.8s ease-in-out infinite;
  flex-shrink:0;
}

@keyframes trackerPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.7);}
}

#labour-tracker-widget h1{
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.4;
  font-weight:600;
  color:rgba(240,236,228,.75);
  word-break:break-word;
}

#labour-tracker-widget .last-updated{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
  line-height:1.4;
}

#labour-tracker-widget .count-block{
  text-align:center;
  padding:10px 0 18px;
}

#labour-tracker-widget .count-number{
  font-family:var(--font-display);
  font-size:clamp(72px,22vw,150px);
  line-height:.9;
  color:var(--red);
  overflow-wrap:break-word;
}

#labour-tracker-widget .count-label{
  font-size:clamp(14px,3.8vw,18px);
  line-height:1.5;
  margin-top:10px;
  color:rgba(240,236,228,.7);
  word-break:break-word;
}

#labour-tracker-widget .count-label strong{
  color:var(--text);
}

#labour-tracker-widget .progress-section{
  margin-top:20px;
}

#labour-tracker-widget .progress-meta{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

#labour-tracker-widget .progress-meta div{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:.05em;
  text-transform:uppercase;
  line-height:1.4;
}

#labour-tracker-widget .progress-track{
  width:100%;
  height:6px;
  background:var(--surface2);
  border-radius:999px;
  overflow:hidden;
}

#labour-tracker-widget .progress-fill{
  height:100%;
  width:0%;
  background:var(--red);
  transition:width .6s ease;
}

#labour-tracker-widget .btn-row{
  display:flex;
  gap:10px;
  margin-top:22px;
}

#labour-tracker-widget .btn{
  flex:1;
  border:none;
  border-radius:8px;
  padding:14px 14px;
  cursor:pointer;
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  background:var(--surface);
  color:var(--text);
  min-height:48px;
  width:100%;
  -webkit-appearance:none;
  appearance:none;
}

#labour-tracker-widget .btn-primary{
  background:rgba(200,16,46,.12);
  border:1px solid var(--red-dark);
  color:#ffb4c0;
}

#labour-tracker-widget .names-panel{
  margin-top:18px;
  display:none;
}

#labour-tracker-widget .names-panel.open{
  display:block;
}

#labour-tracker-widget .names-inner{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  width:100%;
}

#labour-tracker-widget .names-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}

#labour-tracker-widget .names-title,
#labour-tracker-widget .names-count-badge{
  font-family:var(--font-mono);
  font-size:11px;
  text-transform:uppercase;
  line-height:1.4;
}

#labour-tracker-widget .names-list{
  list-style:none;
  width:100%;
}

#labour-tracker-widget .names-list li{
  display:flex;
  gap:12px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  width:100%;
}

#labour-tracker-widget .names-list li:last-child{
  border-bottom:none;
}

#labour-tracker-widget .mp-num{
  width:28px;
  text-align:right;
  color:var(--red);
  font-family:var(--font-mono);
  flex-shrink:0;
}

#labour-tracker-widget .mp-name{
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
  overflow-wrap:anywhere;
}

#labour-tracker-widget .footer{
  margin-top:24px;
  padding-top:14px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

#labour-tracker-widget .footer p{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--muted);
  line-height:1.5;
}

@media(max-width:768px){

  #labour-tracker-widget{
    padding:16px 12px;
  }

  #labour-tracker-widget .widget{
    max-width:100%;
  }

  #labour-tracker-widget .count-number{
    font-size:clamp(68px,24vw,110px);
  }

  #labour-tracker-widget .count-label{
    font-size:15px;
  }

  #labour-tracker-widget .btn-row{
    flex-direction:column;
  }

  #labour-tracker-widget .btn{
    width:100%;
  }

  #labour-tracker-widget .progress-meta{
    flex-direction:column;
    gap:4px;
  }

  #labour-tracker-widget .footer{
    flex-direction:column;
  }
}

@media(max-width:480px){

  #labour-tracker-widget{
    padding:14px 10px;
  }

  #labour-tracker-widget .header{
    align-items:flex-start;
    gap:10px;
  }

  #labour-tracker-widget .rose{
    font-size:24px;
  }

  #labour-tracker-widget h1{
    font-size:13px;
  }

  #labour-tracker-widget .count-number{
    font-size:clamp(60px,26vw,90px);
  }

  #labour-tracker-widget .count-label{
    font-size:14px;
    line-height:1.45;
  }

  #labour-tracker-widget .progress-meta div{
    font-size:10px;
  }

  #labour-tracker-widget .names-list li{
    padding:11px 12px;
  }

  #labour-tracker-widget .mp-name{
    font-size:14px;
  }

  #labour-tracker-widget .footer p{
    font-size:9px;
  }
}
</style>
